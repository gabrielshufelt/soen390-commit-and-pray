<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Loyola Building Details</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="global.css" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#800000",
              "accent": "#0f766e",
              "background-light": "#fcfcfc",
              "background-dark": "#121212",
            },
            fontFamily: {
              "display": ["Lexend", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
  </head>
  <body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="floor-view-layout">
      <div class="absolute inset-0 z-0 map-bg bg-slate-50 dark:bg-slate-900">
        <div class="floor-map-stage campus-highlight" data-location="Concordia University Hall Building Floor 8">
          <div class="floor-map-card">
            <div class="w-1/3 h-20 bg-primary/20 border-2 border-primary rounded-md flex items-center justify-center relative">
              <span class="text-[10px] font-bold text-primary">H-801</span>
            </div>
            <div class="w-1/4 h-20 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md flex items-center justify-center">
              <span class="text-[10px] text-slate-500">H-803</span>
            </div>
            <div class="w-1/3 h-20 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md flex items-center justify-center">
              <span class="text-[10px] text-slate-500">H-805</span>
            </div>
            <div class="w-full h-12 border-x-2 border-slate-200 dark:border-slate-700 flex items-center justify-center my-2">
              <span class="text-xs tracking-widest text-slate-400 uppercase font-light">Main Corridor</span>
            </div>
            <div class="w-1/4 h-24 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md flex items-center justify-center">
              <span class="text-[10px] text-slate-500">H-810</span>
            </div>
            <div class="w-2/3 h-24 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md flex items-center justify-center relative">
              <span class="text-[10px] text-slate-500">H-812</span>
            </div>
            <div class="w-1/3 h-20 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md flex items-center justify-center relative">
              <span class="text-[10px] text-slate-500">H-819</span>
            </div>
            <div class="w-1/4 h-20 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md flex items-center justify-center">
              <span class="text-[10px] text-slate-500">H-821</span>
            </div>
            <div class="w-1/3 h-20 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md flex items-center justify-center">
              <span class="text-[10px] text-slate-500">H-823</span>
            </div>
            <div class="w-full h-12 border-x-2 border-slate-200 dark:border-slate-700 flex items-center justify-center my-2">
              <span class="text-xs tracking-widest text-slate-400 uppercase font-light">Corridor</span>
            </div>
            <div class="w-1/4 h-24 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md flex items-center justify-center">
              <span class="text-[10px] text-slate-500">H-818</span>
            </div>
            <div class="w-2/3 h-24 bg-slate-100 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-md flex items-center justify-center relative">
              <span class="text-[10px] text-slate-500">H-820</span>
            </div>
            <div class="absolute -bottom-0 right-8 flex gap-4">
              <span class="material-symbols-outlined text-primary/60">water_drop</span>
              <span class="material-symbols-outlined text-primary/60">wc</span>
              <span class="material-symbols-outlined text-primary/60">elevator</span>
            </div>
          </div>
        </div>
      </div>

      <div class="absolute top-4 left-0 right-0 z-10 px-4 flex flex-col items-center gap-2">
        <div class="campus-selector ios-blur w-full">
          <label>
            <span class="truncate">SGW</span>
            <input name="campus" type="radio" value="SGW"/>
          </label>
          <label>
            <span class="truncate">Loyola</span>
            <input name="campus" type="radio" value="Loyola" checked/>
          </label>
        </div>
        <div class="flex w-full items-stretch rounded-xl h-12 bg-white dark:bg-[#2a2a2a] shadow-md border border-gray-100 dark:border-gray-800">
          <div class="text-primary flex items-center justify-center pl-4">
            <span class="material-symbols-outlined">search</span>
          </div>
          <input class="form-input flex w-full min-w-0 flex-1 border-none bg-transparent focus:ring-0 h-full placeholder:text-gray-400 text-base font-normal px-4 pl-2" placeholder="Search buildings, rooms..." value=""/>
        </div>
      </div>

      <div class="map-floating-controls">
        <button class="map-action-btn" aria-label="Layers">
          <span class="material-symbols-outlined">layers</span>
        </button>
        <button class="map-action-btn map-action-btn-primary" aria-label="My location">
          <span class="material-symbols-outlined">my_location</span>
        </button>
      </div>

      <div class="mt-auto z-20 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
        <div class="px-4 pt-4 flex gap-2 overflow-x-auto no-scrollbar">
          <div class="flex h-10 min-w-[200px] flex-1 items-center justify-center rounded-md bg-slate-100 dark:bg-slate-800 p-1">
            <label class="flex-1 h-full rounded-md text-slate-500 text-xs font-medium cursor-pointer flex items-center justify-center has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:text-primary has-[:checked]:shadow-sm transition-all">
              H-8
              <input class="hidden" type="radio" name="floor" value="H-8" checked/>
            </label>
            <label class="flex-1 h-full rounded-md text-slate-500 text-xs font-medium cursor-pointer flex items-center justify-center has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:text-primary has-[:checked]:shadow-sm transition-all">
              H-9
              <input class="hidden" type="radio" name="floor" value="H-9"/>
            </label>
            <label class="flex-1 h-full rounded-md text-slate-500 text-xs font-medium cursor-pointer flex items-center justify-center has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:text-primary has-[:checked]:shadow-sm transition-all">
              H-10
              <input class="hidden" type="radio" name="floor" value="H-10"/>
            </label>
          </div>
          <button class="flex items-center gap-2 px-4 h-10 rounded-md bg-primary/10 text-primary border border-primary/20">
            <span class="material-symbols-outlined text-sm">filter_list</span>
            <span class="text-xs font-bold">Filters</span>
          </button>
        </div>
        <div class="flex gap-3 p-4 overflow-x-auto no-scrollbar">
          <div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-md bg-slate-100 dark:bg-slate-800 px-4 border border-slate-200 dark:border-slate-700">
            <span class="material-symbols-outlined text-primary text-lg">water_drop</span>
            <p class="text-slate-900 dark:text-slate-100 text-xs font-medium">Water</p>
          </div>
          <div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-md bg-slate-100 dark:bg-slate-800 px-4 border border-slate-200 dark:border-slate-700">
            <span class="material-symbols-outlined text-primary text-lg">wc</span>
            <p class="text-slate-900 dark:text-slate-100 text-xs font-medium">Washroom</p>
          </div>
          <div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-md bg-slate-100 dark:bg-slate-800 px-4 border border-slate-200 dark:border-slate-700">
            <span class="material-symbols-outlined text-primary text-lg">elevator</span>
            <p class="text-slate-900 dark:text-slate-100 text-xs font-medium">Elevator</p>
          </div>
          <div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-md bg-slate-100 dark:bg-slate-800 px-4 border border-slate-200 dark:border-slate-700">
            <span class="material-symbols-outlined text-primary text-lg">restaurant</span>
            <p class="text-slate-900 dark:text-slate-100 text-xs font-medium">Food</p>
          </div>
        </div>
        <div class="absolute bottom-[140px] left-0 right-0 px-4 flex justify-center pointer-events-none">
          <div class="pointer-events-auto bg-primary text-white px-10 py-3 rounded-md shadow-xl flex items-center gap-3">
            <span class="material-symbols-outlined">directions</span>
            <span class="font-bold text-sm tracking-wide">Directions</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
