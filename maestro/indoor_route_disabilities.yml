appId: com.commitandpray.soen390project
---
- tapOn: Indoor
- tapOn: Route options
- tapOn:
    id: indoor.options.wheelchair
- tapOn:
    id: indoor.options.avoid-stairs
- tapOn: "Done"

# User enters a start room and a destination room in the same building
- tapOn: "110"
- tapOn: "Get Directions To"
- tapOn: ▶
- tapOn: "220"
- tapOn: "Get Directions From"

# Step-by-step instructions reference elevators rather than stairs
- assertVisible: "Route: 220 to 110"
- assertVisible: Take elevator to Floor 1

# The app computes a route that avoids stairs and uses only elevator
- assertVisible:
    id: route-segment
    index: 3
- assertVisible:
    id: route-segment
    index: 2
- assertVisible:
    id: route-segment
    index: 4
- tapOn: ◀

#Step-by-step instructions reference elevators rather than stairs
- assertVisible: "Route: 220 to 110"
- assertVisible: Arrive from Floor 2

#The app computes a route that avoids stairs and uses only elevators and accessible corridors
- assertVisible:
    id: route-segment
    index: 5
- assertVisible:
    id: route-segment
- assertVisible:
    id: route-segment
    index: 1
