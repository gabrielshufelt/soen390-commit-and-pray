appId: com.commitandpray.soen390project
---
- assertVisible: NEXT CLASS
# If walkingMinutes > minutesUntilClass, a high-visibility yellow banner ⚠️ YOU WILL BE LATE is displayed.
- assertVisible: ⚠️ YOU WILL BE LATE (1h33m WALK)
- assertVisible: In 45m
- assertVisible: " 1h33m walk"

#The "Get Directions" button initiates a live route with turn-by-turn steps.
- tapOn: Get Directions

#Directions are automatically generated from the user's current GPS location to the next class building's interior point.
- assertVisible: 1.1 km
- assertVisible: Head northeast on Rue Sherbrooke O toward Path to gym
- assertVisible: NEXT
- assertVisible: Turn right onto Rte 138 O
- assertVisible: 0.4 km
- assertVisible: Step 1 of 10
- assertVisible: 9.1 km · 19 mins
- assertVisible: End navigation
- repeat:
    while:
      notVisible: "Step 10 of 10"
    commands:
      - tapOn: ›
- tapOn: End navigation

# Need to mock location in devConfig.ts to "You are here"
- assertVisible: " You are here"
